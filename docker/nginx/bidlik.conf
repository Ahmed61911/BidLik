# nginx reverse-proxy config for the OVH VPS deployment of BidLik.
#
# Layout:
#   bidlik.ma, www.bidlik.ma  -> the app itself (Dockerized, port 8080)
#   api.bidlik.ma             -> Kong / the self-hosted Supabase stack (port 8000)
#
# Split by subdomain rather than by path prefix so Kong's own routing
# (docker/kong/kong.yml: /auth/v1, /rest/v1, /storage/v1, /realtime/v1) needs
# no rewriting here — nginx just forwards the whole subdomain through as-is.
#
# Install:
#   sudo cp docker/nginx/bidlik.conf /etc/nginx/sites-available/bidlik.conf
#   sudo ln -s /etc/nginx/sites-available/bidlik.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run certbot (see docs/DEPLOYMENT.md) to add the HTTPS server blocks —
# certbot --nginx rewrites this file in place to add them, so don't hand-edit
# a "listen 443" block here ahead of time.

server {
    listen 80;
    listen [::]:80;
    server_name bidlik.ma www.bidlik.ma;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (Vite HMR in dev mode; harmless if unused in prod).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.bidlik.ma;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for Supabase Realtime's websocket connections
        # (Kong route: /realtime/v1 -> realtime:4000/socket).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s; # long-lived websocket connections
    }
}
