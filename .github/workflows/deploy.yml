name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore: [mobile/**]
  pull_request:
    branches: [main]
    paths-ignore: [mobile/**]
  # Lets you trigger a run on demand from the Actions tab (e.g. to redeploy
  # without a new commit) — see the "Run workflow" button.
  workflow_dispatch:

jobs:
  test:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: ./node_modules/.bin/tsc --noEmit

      - name: Unit tests
        run: bun run test

      - name: Build check
        run: bun run build

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    # Deploy on a push to main, or a manual "Run workflow" click on main —
    # never on pull requests, and never if the test job above failed.
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/bidlik
            git pull origin main
            ./docker/migrate/run.sh
            docker compose -f docker/docker-compose.yml build app
            docker compose -f docker/docker-compose.yml up -d app
